    btn.style.display = "none";
  };
  const showBackToTop = () => {
    btn.style.display = "inline-block";
  };

      "scroll",
      function () {

          window.pageYOffset || document.documentElement.scrollTop;

          hideBackToTop();

          showBackToTop();
